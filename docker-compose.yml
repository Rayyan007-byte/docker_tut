  services:
    backend:
      build: ./server
      ports:
        - "3000:3000"

      env_file:
        - .env

      depends_on:
        - mongo

      volumes:
        - ./server:/app
        - /app/node_modules

    frontend:
      build: ./client
      ports:
        - "5173:5173"

      depends_on:
        - backend

      volumes:
        - ./client:/app
        - /app/node_modules

    mongo:
      image: mongo:7
      ports:
        - "27017:27017"

      volumes:
        - mongo-data:/data/db

  volumes:
    mongo-data: